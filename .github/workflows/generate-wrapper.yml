name: Generate Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Generate wrapper
        run: |
          gradle wrapper --gradle-version 8.7
          rm -f .gitattributes

      - name: Commit and push
        run: |
          git config user.name "sleepy-snowflake"
          git config user.email "pkpakisanp804@gmail.com"
          git add gradle/wrapper/gradle-wrapper.jar gradlew gradlew.bat
          git commit -m "Add Gradle wrapper JAR" || echo "Nothing to commit"
          git push
